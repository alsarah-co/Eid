<script>

const TEMPLATES = {
  "template1.png": { xRatio: 0.5, yRatio: 0.88, fontSize: 70, color: "#3b2a1a" },
  "template2.png": { xRatio: 0.5, yRatio: 0.88, fontSize: 70, color: "#fcf5ed" },
  "template3.png": { xRatio: 0.5, yRatio: 0.88, fontSize: 70, color: "#fcf5ed" }
};

let selectedTemplate = "template1.png";
let fontReady = false;

const canvas    = document.getElementById("c");
const ctx       = canvas.getContext("2d");
const nameInput = document.getElementById("name");
const genBtn    = document.getElementById("gen");
const dlBtn     = document.getElementById("dl");
let lastUrl = null;

// ── تحميل الخط مرة وحدة عند فتح الصفحة ──────────────────────
const testFont = new FontFace(
  "GE_SS_Two_Bold",
  "url('GE-SS-Two-Bold.otf')",
  { weight: "800" }
);

testFont.load().then(loadedFace => {
  document.fonts.add(loadedFace);
  fontReady = true;
  console.log("✅ الخط جاهز");
}).catch(err => {
  console.warn("⚠️ فشل تحميل الخط:", err);
  fontReady = true; // نكمل حتى لو فشل
});

// ── تصغير الخط تلقائياً ───────────────────────────────────────
function calcFontSize(text, maxWidth, startSize){
  let size = startSize;
  ctx.font = `800 ${size}px GE_SS_Two_Bold`;
  while(size > 24 && ctx.measureText(text).width > maxWidth){
    size -= 2;
    ctx.font = `800 ${size}px GE_SS_Two_Bold`;
  }
  return size;
}

// ── رسم الاسم على الكانفاس ────────────────────────────────────
function drawName(img, name, cfg){
  canvas.width  = img.naturalWidth;
  canvas.height = img.naturalHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0);

  const X     = canvas.width  * cfg.xRatio;
  const Y     = canvas.height * cfg.yRatio;
  const maxW  = canvas.width  * 0.80;
  const fSize = calcFontSize(name, maxW, cfg.fontSize);

  ctx.save();
  ctx.font         = `800 ${fSize}px GE_SS_Two_Bold`;
  ctx.textAlign    = "center";
  ctx.textBaseline = "middle";
  ctx.direction    = "rtl";
  ctx.fillStyle    = cfg.color;
  ctx.shadowColor   = "rgba(0,0,0,0.25)";
  ctx.shadowBlur    = 8;
  ctx.shadowOffsetY = 3;
  ctx.fillText(name, X, Y);
  ctx.shadowColor = "transparent";
  ctx.strokeStyle = cfg.color;
  ctx.lineWidth   = 1.5;
  ctx.strokeText(name, X, Y);
  ctx.restore();

  lastUrl = canvas.toDataURL("image/png");
  dlBtn.disabled = false;
}

// ── الدالة الرئيسية ───────────────────────────────────────────
function generate(){
  const name = nameInput.value.trim();
  if(!name) return alert("اكتب الاسم");

  const cfg = TEMPLATES[selectedTemplate];

  const tryDraw = () => {
    const img = new Image();
    img.src = selectedTemplate;
    img.onload = () => drawName(img, name, cfg);
    img.onerror = () => alert("تأكد أن ملفات التصاميم موجودة بنفس الاسم.");
  };

  // لو الخط جاهز ارسم مباشرة، لو لا انتظر
  if(fontReady){
    tryDraw();
  } else {
    const wait = setInterval(() => {
      if(fontReady){
        clearInterval(wait);
        tryDraw();
      }
    }, 100);
  }
}

function download(){
  if(!lastUrl) return;
  const a    = document.createElement("a");
  a.href     = lastUrl;
  a.download = "بطاقة.png";
  a.click();
}

genBtn.onclick = generate;
dlBtn.onclick  = download;

document.querySelectorAll(".tpl-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    selectedTemplate = btn.dataset.img;
    document.querySelectorAll(".tpl-btn")
            .forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  });
});

</script>
