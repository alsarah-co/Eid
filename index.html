<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>بطاقة تهنئة</title>
<style>

@font-face {
  font-family: 'GE_SS_Two_Bold';
  src: url('GE-SS-Two-Bold.otf') format('opentype');
}

body{
  margin:0;
  font-family:'GE_SS_Two_Bold', Arial, sans-serif;
  background:#f4f4f4;
}
.wrap{
  max-width:900px;
  margin:30px auto;
  padding:15px;
}
.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}
.top{
  display:flex;
  justify-content:flex-end;
  margin-bottom:12px;
}
.logo{
  height:46px;
  width:auto;
}
.row{
  display:flex;
  gap:12px;
  align-items:flex-end;
  flex-wrap:wrap;
}
.field{
  flex:1 1 420px;
  min-width:260px;
}
label{
  font-weight:bold;
  margin-bottom:6px;
  display:block;
}
input{
  width:100%;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}
button{
  padding:12px 18px;
  border-radius:10px;
  border:0;
  font-weight:bold;
  cursor:pointer;
  flex:0 0 auto;
  white-space:nowrap;
}
.primary{
  background:#6b0f1a;
  color:#fff;
}
.ghost{
  background:#eee;
  color:#433b65;
}
.templates{
  margin-top:15px;
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}
.templates span{
  font-size:13px;
  color:#666;
  font-weight:bold;
}
.tpl-btn{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #ccc;
  background:#f5f5f5;
  cursor:pointer;
  font-family:'GE_SS_Two_Bold', Arial, sans-serif;
}
.tpl-btn.active{
  background:#6b0f1a;
  color:#fff;
  border-color:#6b0f1a;
}
canvas{
  width:100%;
  height:auto;
  margin-top:20px;
  border-radius:16px;
}

</style>
</head>
<body>

<div class="wrap">
  <div class="card">

    <div class="top">
      <img src="logo.png" class="logo" alt="Logo">
    </div>

    <div class="row">
      <div class="field">
        <label>اسم الموظف</label>
        <input id="name" placeholder="اكتب الاسم هنا" />
      </div>
      <button class="primary" id="gen">إنشاء البطاقة</button>
      <button class="ghost" id="dl" disabled>تحميل</button>
    </div>

    <div class="templates">
      <span>اختر التصميم:</span>
      <button type="button" class="tpl-btn active" data-img="template1.png">تصميم 1</button>
      <button type="button" class="tpl-btn" data-img="template2.png">تصميم 2</button>
      <button type="button" class="tpl-btn" data-img="template3.png">تصميم 3</button>
    </div>

    <canvas id="c"></canvas>

  </div>
</div>

<script>

const TEMPLATES = {
  "template1.png": { xRatio: 0.5, yRatio: 0.88, fontSize: 50, color: "#fcf5ed" }, // غيرنا 70 → 50
  "template2.png": { xRatio: 0.5, yRatio: 0.88, fontSize: 70, color: "#fcf5ed" },
  "template3.png": { xRatio: 0.5, yRatio: 0.88, fontSize: 70, color: "#fcf5ed" }
};

let selectedTemplate = "template1.png";
let fontReady = false;

const canvas    = document.getElementById("c");
const ctx       = canvas.getContext("2d");
const nameInput = document.getElementById("name");
const genBtn    = document.getElementById("gen");
const dlBtn     = document.getElementById("dl");
let lastUrl = null;

// تحميل الخط مرة وحدة عند فتح الصفحة
const testFont = new FontFace(
  "GE_SS_Two_Bold",
  "url('GE-SS-Two-Bold.otf')",
  { weight: "800" }
);

testFont.load().then(loadedFace => {
  document.fonts.add(loadedFace);
  fontReady = true;
}).catch(() => {
  fontReady = true;
});

function calcFontSize(text, maxWidth, startSize){
  let size = startSize;
  ctx.font = `800 ${size}px GE_SS_Two_Bold`;
  while(size > 24 && ctx.measureText(text).width > maxWidth){
    size -= 2;
    ctx.font = `800 ${size}px GE_SS_Two_Bold`;
  }
  return size;
}

function drawName(img, name, cfg){
  canvas.width  = img.naturalWidth;
  canvas.height = img.naturalHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0);

  const X     = canvas.width  * cfg.xRatio;
  const Y     = canvas.height * cfg.yRatio;
  const maxW  = canvas.width  * 0.80;
  const fSize = calcFontSize(name, maxW, cfg.fontSize);

  ctx.save();
  ctx.font         = `800 ${fSize}px GE_SS_Two_Bold`;
  ctx.textAlign    = "center";
  ctx.textBaseline = "middle";
  ctx.direction    = "rtl";
  ctx.fillStyle    = cfg.color;
  ctx.shadowColor   = "rgba(0,0,0,0.25)";
  ctx.shadowBlur    = 8;
  ctx.shadowOffsetY = 3;
  ctx.fillText(name, X, Y);
  ctx.shadowColor = "transparent";
  ctx.strokeStyle = cfg.color;
  ctx.lineWidth   = 1.5;
  ctx.strokeText(name, X, Y);
  ctx.restore();

  lastUrl = canvas.toDataURL("image/png");
  dlBtn.disabled = false;
}

function generate(){
  const name = nameInput.value.trim();
  if(!name) return alert("اكتب الاسم");

  const cfg = TEMPLATES[selectedTemplate];

  const tryDraw = () => {
    const img = new Image();
    img.src = selectedTemplate;
    img.onload = () => drawName(img, name, cfg);
    img.onerror = () => alert("تأكد أن ملفات التصاميم موجودة بنفس الاسم.");
  };

  if(fontReady){
    tryDraw();
  } else {
    const wait = setInterval(() => {
      if(fontReady){
        clearInterval(wait);
        tryDraw();
      }
    }, 100);
  }
}

function download(){
  if(!lastUrl) return;
  const a    = document.createElement("a");
  a.href     = lastUrl;
  a.download = "بطاقة.png";
  a.click();
}

genBtn.onclick = generate;
dlBtn.onclick  = download;

document.querySelectorAll(".tpl-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    selectedTemplate = btn.dataset.img;
    document.querySelectorAll(".tpl-btn")
            .forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  });
});

</script>
</body>
</html>
